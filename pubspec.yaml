name: openlab
description: "BloodWise — Understand Your Health, Simply. AI-powered blood report analysis."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Firebase & Auth
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  google_sign_in: ^6.2.2

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Charts
  fl_chart: ^0.70.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.3.1

  # File Picking
  image_picker: ^1.1.2
  file_picker: ^8.1.8

  # In-App Purchases
  purchases_flutter: ^9.14.0

  # Utils
  intl: ^0.20.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.2
  purchases_ui_flutter: ^9.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/lottie/
